name: Twitter-Sentiment-Analysis
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fast-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: postgres1
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:alpine
    container_name: redis1
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  # ── Redis Exporter ─────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis1:6379"   # use container_name of your redis service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend                   # same network as redis ✅

  # ── Postgres Exporter ──────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres1:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend                   # same network as postgres ✅

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge

