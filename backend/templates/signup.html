<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Twitter Sentiment Detection</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page-wrapper auth-shell">
    <div class="shell">
      <nav class="topnav auth-topnav">
        <a href="/" class="nav-link">Sentilytics</a>
        <div class="nav-actions">
          <a href="/auth/login" class="btn-nav-secondary">Sign in</a>
        </div>
      </nav>

      <header class="auth-header">
        <span class="eyebrow">Step 1</span>
        <h1>Create account</h1>
        <p>Start here, then sign in.</p>
      </header>

      <main class="auth-layout">
        <section class="card">
          {% if error %}
          <div class="flash flash-error">{{ error }}</div>
          {% endif %}

          {% if success %}
          <div class="flash flash-success">{{ success }}</div>
          {% endif %}

          <form action="/auth/signup" method="POST">
            <div class="form-group">
              <label class="form-label" for="username">Username</label>
              <input
                class="form-input"
                type="text"
                id="username"
                name="username"
                placeholder="Username"
                autocomplete="username"
                minlength="3"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                placeholder="At least 8 characters"
                autocomplete="new-password"
                minlength="8"
                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&amp;*(),.?&quot;:{}|&lt;&gt;]).{8,}"
                required
              />
              <p class="form-help">8+ chars, upper, lower, number, symbol.</p>
            </div>

            <button type="submit" class="btn-auth">Create account</button>
          </form>

          <div class="auth-switch">
            Already have an account? <a href="/auth/login">Sign in</a>
          </div>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
