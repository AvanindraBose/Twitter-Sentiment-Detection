<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Twitter Sentiment Detection</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page-wrapper auth-shell">
    <div class="shell">
      <nav class="topnav auth-topnav">
        <a href="/" class="nav-link">Sentilytics</a>
        <div class="nav-actions">
          <a href="/auth/signup" class="btn-nav-secondary">Sign up</a>
        </div>
      </nav>

      <header class="auth-header">
        <span class="eyebrow">Step 2</span>
        <h1>Sign in</h1>
        <p>Continue to the dashboard.</p>
      </header>

      <main class="auth-layout">
        <section class="card">
          {% if error %}
          <div class="flash flash-error">{{ error }}</div>
          {% endif %}

          {% if success %}
          <div class="flash flash-success">{{ success }}</div>
          {% endif %}

          <form action="/auth/login" method="POST">
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                placeholder="Your password"
                autocomplete="current-password"
                required
              />
            </div>

            <button type="submit" class="btn-auth">Sign in</button>
          </form>

          <div class="auth-switch">
            Don't have an account? <a href="/auth/signup">Sign up</a>
          </div>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
