  deploy-api-to-ecs:
    needs:
      - changes
      - docker-build-check
      - post-promotion-api-checks
    
    if: >-
      always() &&
      (github.event_name == 'push') &&
      (github.ref == 'refs/heads/main') &&
      (
        needs.post-promotion-api-checks.result == 'success' ||
          (
            needs.changes.outputs.container == 'true' &&
            needs.docker-build-check.result == 'success'
          )
      )
      
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-north-1
      ECR_REGISTRY: 660838764267.dkr.ecr.eu-north-1.amazonaws.com
      ECR_REPOSITORY: ml/sentiment-analysis-app
      DEPLOYMENT_S3_BUCKET: sentiment-analysis-docker-compose-bucket
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
      ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
      ECS_TASK_DEFINITION: .github/ecs/twitter-sentiment-containers-revision8.json
      CONTAINER_NAME: fast-api

    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: login to aws ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: create deployment env file
        env:
          API_KEY: ${{ secrets.API_KEY }}
          JWT_ACCESS_SECRET_KEY: ${{ secrets.JWT_ACCESS_SECRET_KEY }}
          JWT_REFRESH_SECRET_KEY: ${{ secrets.JWT_REFRESH_SECRET_KEY }}
          REDIS_URL: ${{ secrets.AWS_ECS_REDIS_URL }}
          DATABASE_URL: ${{ secrets.AWS_ECS_DATABASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          LOGIN_RATE_LIMIT: ${{ secrets.LOGIN_RATE_LIMIT || '5' }}
          LOGIN_RATE_WINDOW: ${{ secrets.LOGIN_RATE_WINDOW || '60' }}
          REFRESH_RATE_LIMIT: ${{ secrets.REFRESH_RATE_LIMIT || '10' }}
          REFRESH_RATE_WINDOW: ${{ secrets.REFRESH_RATE_WINDOW || '300' }}
          PREDICT_RATE_LIMIT: ${{ secrets.PREDICT_RATE_LIMIT || '50' }}
          PREDICT_RATE_WINDOW: ${{ secrets.PREDICT_RATE_WINDOW || '60' }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS: ${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: |
          required_vars=(
            API_KEY
            JWT_ACCESS_SECRET_KEY
            JWT_REFRESH_SECRET_KEY
            REDIS_URL
            DATABASE_URL
            POSTGRES_USER
            POSTGRES_PASSWORD
            POSTGRES_DB
            MLFLOW_TRACKING_URI
            ACCESS_TOKEN_EXPIRE_MINUTES
            REFRESH_TOKEN_EXPIRE_DAYS
            DAGSHUB_PAT
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required GitHub Secret: ${var_name}"
              exit 1
            fi
          done

          {
            echo "API_KEY=${API_KEY}"
            echo "JWT_ACCESS_SECRET_KEY=${JWT_ACCESS_SECRET_KEY}"
            echo "JWT_REFRESH_SECRET_KEY=${JWT_REFRESH_SECRET_KEY}"
            echo "REDIS_URL=${REDIS_URL}"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "POSTGRES_USER=${POSTGRES_USER}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "POSTGRES_DB=${POSTGRES_DB}"
            echo "MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}"
            echo "LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT}"
            echo "LOGIN_RATE_WINDOW=${LOGIN_RATE_WINDOW}"
            echo "REFRESH_RATE_LIMIT=${REFRESH_RATE_LIMIT}"
            echo "REFRESH_RATE_WINDOW=${REFRESH_RATE_WINDOW}"
            echo "PREDICT_RATE_LIMIT=${PREDICT_RATE_LIMIT}"
            echo "PREDICT_RATE_WINDOW=${PREDICT_RATE_WINDOW}"
            echo "ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}"
            echo "REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS}"
            echo "DAGSHUB_PAT=${DAGSHUB_PAT}"
          } > .env

      - name: upload deployment files to s3
        run: |
          aws s3 cp docker-compose.yaml "s3://${DEPLOYMENT_S3_BUCKET}/docker-compose.yaml"
          aws s3 cp .env "s3://${DEPLOYMENT_S3_BUCKET}/.env"

      - name: build docker image
        if: success()
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          docker build \
            -t "${IMAGE_URI}:${{ github.sha }}" \
            -t "${IMAGE_URI}:latest" .
      
      - name: push docker image to AWS ECR
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          docker push "${IMAGE_URI}:${GITHUB_SHA}"
          docker push "${IMAGE_URI}:latest"

      - name: fill in new image id in ecs task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: deploy ecs task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
