stages:
  data_ingestion:
    cmd: python src/data/data_ingestion.py
    deps:
    - src/data/data_ingestion.py
    params:
    - data_ingestion.test_size
    outs:
    - data/raw
  data_preprocessing:
    cmd: python src/data/data_preprocessing.py
    deps:
    - src/data/data_preprocessing.py
    - data/raw
    outs:
    - data/interim
  feature_engineering:
    cmd: python src/features/feature_engineering.py
    deps:
    - data/interim
    - src/features/feature_engineering.py
    params:
    - feature_engineering.max_features
    outs:
    - data/processed
  model_building:
    cmd: python src/models/model_building.py
    deps:
    - data/processed/train_bow.csv
    - src/models/model_building.py
    params:
    - model_building.C
    - model_building.solver
    - model_building.penalty
    outs:
    - models/model.joblib
  model_evaluation:
    cmd: python src/models/model_evaluation.py
    deps:
    - data/processed/test_bow.csv
    - models/model.joblib
    - src/models/model_evaluation.py
    outs:
    - reports/experiments_info.json
    metrics:
    - reports/metrics.json
  model_registry:
    cmd: python src/models/model_registry.py
    deps:
    - reports/experiments_info.json
